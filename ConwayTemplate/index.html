<!doctype html>

<html>
  <head>
    <meta charset="utf-8">
    <title>Game of life GPU</title>
    <style>
    canvas{ position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
    </style>
  </head>

  <body>
    <canvas width="512" height="512"></canvas>
    <script type="module">
      const GRID_SIZE = 32;
      const WORKGROUP_SIZE = 8;

      const canvas = document.querySelector("canvas");

      /// Check support for WebGPU
      if (!navigator.gpu) { throw new Error("WebGPU not supported on this browser."); }

      /// Create adapter ("representation of a specific piece of GPU hardware in your device")
      const adapter = await navigator.gpu.requestAdapter();
      if (!adapter) { throw new Error("No appropriate GPUAdapter found."); }

      /// Create device ("the main interface through which most interaction with the GPU happens")
      const device = await adapter.requestDevice();

      /// Create GPUCanvasContext
      const context = canvas.getContext("webgpu");
      const canvasFormat = navigator.gpu.getPreferredCanvasFormat();
      context.configure({
        device: device,        // Needs to be configured with the device
        format: canvasFormat,  // and the texture formate the canvas will use
      });

      /// Cell as an array of vertices (must be provided as a list of triangles)
      const vertices = new Float32Array([
      //   X,    Y,
        -0.8, -0.8, // Triangle 1
         0.8, -0.8,
         0.8,  0.8,

        -0.8, -0.8, // Triangle 2
         0.8,  0.8,
        -0.8,  0.8,
      ]);

      /// vertex buffer to contain vertex info
      const vertexBuffer = device.createBuffer({
        label: "Cell vertices",
        size: vertices.byteLength,
        usage: GPUBufferUsage.VERTEX | GPUBufferUsage.COPY_DST,
      });

      /// Write vertex data to buffer
      device.queue.writeBuffer(vertexBuffer, /*bufferOffset=*/0, vertices);

      /// dictionary with vertex buffer layout information
      const vertexBufferLayout = {
        arrayStride: 8, // the number of bytes the GPU needs to skip forward in the buffer when it's looking for the next vertex
        attributes: [{
          format: "float32x2",
          offset: 0,
          shaderLocation: 0, // Position from 0 to 15
        }],
      };

      /// Create bind group layout and pipeline layout.
      const bindGroupLayout = device.createBindGroupLayout({
        label: "Cell Bind Group Layout",
        entries: [{
          binding: 0,
          // Add GPUShaderStage.FRAGMENT here if you are using the `grid` uniform in the fragment shader.
          visibility: GPUShaderStage.VERTEX | GPUShaderStage.COMPUTE | GPUShaderStage.FRAGMENT,
          buffer: {} // Grid uniform buffer
        }, {
          binding: 1,
          visibility: GPUShaderStage.VERTEX | GPUShaderStage.COMPUTE,
          buffer: { type: "read-only-storage"} // Cell state input buffer
        }, {
          binding: 2,
          visibility: GPUShaderStage.COMPUTE,
          buffer: { type: "storage"} // Cell state output buffer
        }]
      });

      const pipelineLayout = device.createPipelineLayout({
        label: "Cell Pipeline Layout",
        bindGroupLayouts: [ bindGroupLayout ],
      });

      /// Cell shader written in WGSL ("similar to Rust")
      const cellShaderModule = device.createShaderModule({
        label: "Cell shader",
        code: `
          struct VertexInput {
            @location(0) pos: vec2f,
            @builtin(instance_index) instance: u32,
          };

          struct VertexOutput {
            @builtin(position) pos: vec4f,
            @location(0) cell: vec2f,
          };

          @group(0) @binding(0) var<uniform> grid: vec2f;
          @group(0) @binding(1) var<storage> cellState: array<u32>;

          @vertex
          fn vertexMain(input: VertexInput) -> VertexOutput {
//            let i = f32(input.instance);
//            let cell = vec2f(i % grid.x, floor(i / grid.x));

            let state = f32(cellState[input.instance]);

            let x = input.instance % u32(grid.x);
            let y = input.instance / u32(grid.x);
            let cell = vec2f(f32(x), f32(y));

            let cellOffset = cell / grid * 2;
            let gridPos = (input.pos * state + 1) / grid - 1 + cellOffset;

            var output: VertexOutput;
            output.pos = vec4f(gridPos, 0, 1);
            output.cell = cell;
            return output;
          }

          @fragment
          fn fragmentMain(@location(0) cell: vec2f) -> @location(0) vec4f {
            let c = cell / grid;
            return vec4f(c, 1 - c.x, 1);
          }
        `
      });

      /// Create a render pipeline ("controls how geometry is drawn")
      const cellPipeline = device.createRenderPipeline({
        label: "Cell pipeline",
        layout: pipelineLayout,
        vertex: {
          module: cellShaderModule,
          entryPoint: "vertexMain",
          buffers: [vertexBufferLayout]
        },
        fragment: {
          module: cellShaderModule,
          entryPoint: "fragmentMain",
          targets: [{
            format: canvasFormat
          }]
        }
      });

      // Create the compute shader that will process the simulation.
      const simulationShaderModule = device.createShaderModule({
        label: "Life simulation shader",
        code: `
          @group(0) @binding(0) var<uniform> grid: vec2f;

          @group(0) @binding(1) var<storage> cellStateIn: array<u32>;
          @group(0) @binding(2) var<storage, read_write> cellStateOut: array<u32>;

          fn cellIndex(cell: vec2u) -> u32 {
            return (cell.y % u32(grid.y)) * u32(grid.x) +
                    (cell.x % u32(grid.x));
          }

          fn cellActive(x: u32, y: u32) -> u32 {
            return cellStateIn[cellIndex(vec2(x, y))];
          }

          @compute @workgroup_size(${WORKGROUP_SIZE}, ${WORKGROUP_SIZE})
          fn computeMain(@builtin(global_invocation_id) cell: vec3u) {
            // Determine how many active neighbors this cell has.
            let activeNeighbors = cellActive(cell.x+1, cell.y+1) +
                                  cellActive(cell.x+1, cell.y) +
                                  cellActive(cell.x+1, cell.y-1) +
                                  cellActive(cell.x, cell.y-1) +
                                  cellActive(cell.x-1, cell.y-1) +
                                  cellActive(cell.x-1, cell.y) +
                                  cellActive(cell.x-1, cell.y+1) +
                                  cellActive(cell.x, cell.y+1);

            let i = cellIndex(cell.xy);

            // Conway's game of life rules:
            switch activeNeighbors {
              case 2: {
                cellStateOut[i] = cellStateIn[i];
              }
              case 3: {
                cellStateOut[i] = 1;
              }
              default: {
                cellStateOut[i] = 0;
              }
            }
          }
        `
      });

      /// Compute pipeline that updates the game state
      const simulationPipeline = device.createComputePipeline({
        label: "Simulation pipeline",
        layout: pipelineLayout,
        compute: {
          module: simulationShaderModule,
          entryPoint: "computeMain",
        }
      });

      /// Uniform buffer describing the grid
      const uniformArray = new Float32Array([GRID_SIZE, GRID_SIZE]);
      const uniformBuffer = device.createBuffer({
        label: "Grid Uniforms",
        size: uniformArray.byteLength,
        usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
      });
      device.queue.writeBuffer(uniformBuffer, 0, uniformArray);

      // Create an array representing the active state of each cell.
      const cellStateArray = new Uint32Array(GRID_SIZE * GRID_SIZE);

      // Create two storage buffers to hold the cell state.
      const cellStateStorage = [
        device.createBuffer({
          label: "Cell State A",
          size: cellStateArray.byteLength,
          usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST,
        }),
        device.createBuffer({
          label: "Cell State B",
           size: cellStateArray.byteLength,
           usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST,
        })
      ];

      for (let i = 0; i < cellStateArray.length; i++) {
        cellStateArray[i] = Math.random() > 0.6 ? 1 : 0;
      }
      device.queue.writeBuffer(cellStateStorage[0], 0, cellStateArray);

      /// Bind Group ("a collection of resources that you want to make accessible to your shader at the same time")
      const bindGroups = [
        device.createBindGroup({
          label: "Cell renderer bind group A",
          layout: bindGroupLayout,
          entries: [{
            binding: 0,
            resource: { buffer: uniformBuffer }
          }, {
            binding: 1,
            resource: { buffer: cellStateStorage[0] }
          }, {
            binding: 2,
            resource: { buffer: cellStateStorage[1] }
          }],
        }),
         device.createBindGroup({
          label: "Cell renderer bind group B",
          layout: bindGroupLayout,
          entries: [{
            binding: 0,
            resource: { buffer: uniformBuffer }
          }, {
            binding: 1,
            resource: { buffer: cellStateStorage[1] }
          }, {
            binding: 2,
            resource: { buffer: cellStateStorage[0] }
          }],
        })
      ];

      const UPDATE_INTERVAL = 200; // Update every 200ms (5 times/sec)
      let step = 0; // Track how many simulation steps have been run

      // Move all of our rendering code into a function
      function updateGrid() {
        /// Create encoder ("provides an interface for recording GPU commands")
        const encoder = device.createCommandEncoder();

        const computePass = encoder.beginComputePass();
        computePass.setPipeline(simulationPipeline);
        computePass.setBindGroup(0, bindGroups[step % 2]);
        const workgroupCount = Math.ceil(GRID_SIZE / WORKGROUP_SIZE);
        computePass.dispatchWorkgroups(workgroupCount, workgroupCount);
        computePass.end();

        step++; // Increment the step count

        /// Render pass to clear canvas (record the command)
        const pass = encoder.beginRenderPass({
          colorAttachments: [{
            view: context.getCurrentTexture().createView(),
            loadOp: "clear",
            clearValue: { r: 0, g: 0, b: 0.4, a: 1.0 },
            storeOp: "store",
          }]
        });
        pass.setPipeline(cellPipeline);
        pass.setBindGroup(0, bindGroups[step % 2]);
        pass.setVertexBuffer(0, vertexBuffer);
        pass.draw(vertices.length / 2, GRID_SIZE * GRID_SIZE); // 6 vertices
        pass.end();

        /// Produce and submit the command buffer (cannot be used again)
        const commandBuffer = encoder.finish();
        device.queue.submit([commandBuffer]);

      }

      // Schedule updateGrid() to run repeatedly
      setInterval(updateGrid, UPDATE_INTERVAL);

    </script>
  </body>
</html>
